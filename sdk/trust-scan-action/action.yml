name: "AgentGraph Trust Scan"
description: "Scan an MCP/agent-tool repo via AgentGraph's free API; posts the trust grade as a PR comment, can fail the build."
author: "AgentGraph"

branding:
  icon: "shield"
  color: "purple"

inputs:
  repo:
    description: "owner/repo to scan (defaults to the current repository)"
    required: false
    default: ${{ github.repository }}
  api-url:
    description: "AgentGraph API base URL"
    required: false
    default: "https://agentgraph.co/api/v1"
  fail-below:
    description: "Fail the build if the trust score is below this threshold (0-100). 0 = never fail."
    required: false
    default: "0"
  comment-on-pr:
    description: "Post/update a sticky trust-grade comment on the pull request"
    required: false
    default: "true"
  github-token:
    description: "Token used to post the PR comment (auto-provided as github.token; no AgentGraph secret needed)"
    required: false
    default: ${{ github.token }}

outputs:
  trust-score:
    description: "Trust score 0-100 (security scan score)"
    value: ${{ steps.scan.outputs.trust_score }}
  grade:
    description: "Letter grade derived from the score (A+, A, B, C, D, F)"
    value: ${{ steps.scan.outputs.grade }}
  scan-result:
    description: "Scan result (clean, warnings, flagged, etc.)"
    value: ${{ steps.scan.outputs.scan_result }}
  badge-url:
    description: "URL of the embeddable SVG trust badge"
    value: ${{ steps.scan.outputs.badge_url }}
  report-url:
    description: "URL of the human-readable trust report (/check page)"
    value: ${{ steps.scan.outputs.report_url }}

runs:
  using: "composite"
  steps:
    - name: Scan repository on AgentGraph
      id: scan
      shell: bash
      env:
        AG_API_URL: ${{ inputs.api-url }}
        AG_REPO: ${{ inputs.repo }}
        AG_FAIL_BELOW: ${{ inputs.fail-below }}
      run: |
        set -euo pipefail

        # Ensure jq is available (present by default on ubuntu-latest runners).
        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq is required but was not found on the runner."
          exit 1
        fi

        REPO="${AG_REPO}"
        if [ -z "$REPO" ] || [[ "$REPO" != */* ]]; then
          echo "::error::'repo' must be in owner/repo form (got: '$REPO')"
          exit 1
        fi
        OWNER="${REPO%%/*}"
        NAME="${REPO#*/}"

        SCAN_URL="${AG_API_URL%/}/public/scan/${OWNER}/${NAME}"
        echo "::debug::Scanning ${REPO} via ${SCAN_URL}"

        # Fetch the scan result (unauthenticated, cached/fast).
        HTTP_RESPONSE=$(curl -sS -w $'\n%{http_code}' \
          -H "Accept: application/json" \
          "$SCAN_URL" || true)

        HTTP_STATUS=$(printf '%s' "$HTTP_RESPONSE" | tail -n1)
        HTTP_BODY=$(printf '%s' "$HTTP_RESPONSE" | sed '$d')

        if [ "$HTTP_STATUS" != "200" ]; then
          echo "::error::AgentGraph scan failed (HTTP ${HTTP_STATUS}) for ${REPO}"
          echo "$HTTP_BODY"
          exit 1
        fi

        if ! printf '%s' "$HTTP_BODY" | jq -e . >/dev/null 2>&1; then
          echo "::error::AgentGraph returned a non-JSON response for ${REPO}"
          echo "$HTTP_BODY"
          exit 1
        fi

        # Parse the documented response shape.
        SCORE=$(printf '%s' "$HTTP_BODY" | jq -r '.trust_score // 0')
        SCAN_RESULT=$(printf '%s' "$HTTP_BODY" | jq -r '.scan_result // "unknown"')
        F_CRIT=$(printf '%s' "$HTTP_BODY" | jq -r '.findings.critical // 0')
        F_HIGH=$(printf '%s' "$HTTP_BODY" | jq -r '.findings.high // 0')
        F_MED=$(printf '%s' "$HTTP_BODY" | jq -r '.findings.medium // 0')
        F_TOTAL=$(printf '%s' "$HTTP_BODY" | jq -r '.findings.total // 0')

        # Normalize score to an integer for grading + comparison.
        SCORE_INT=$(printf '%.0f' "$SCORE" 2>/dev/null || echo 0)

        # Derive letter grade (matches AgentGraph's _grade_from_score).
        if [ "$SCORE_INT" -ge 96 ]; then GRADE="A+"
        elif [ "$SCORE_INT" -ge 81 ]; then GRADE="A"
        elif [ "$SCORE_INT" -ge 61 ]; then GRADE="B"
        elif [ "$SCORE_INT" -ge 41 ]; then GRADE="C"
        elif [ "$SCORE_INT" -ge 21 ]; then GRADE="D"
        else GRADE="F"
        fi

        BADGE_URL="${SCAN_URL}/badge"
        REPORT_URL="https://agentgraph.co/check/${OWNER}/${NAME}"

        # Export outputs.
        {
          echo "trust_score=${SCORE_INT}"
          echo "grade=${GRADE}"
          echo "scan_result=${SCAN_RESULT}"
          echo "badge_url=${BADGE_URL}"
          echo "report_url=${REPORT_URL}"
          echo "findings_critical=${F_CRIT}"
          echo "findings_high=${F_HIGH}"
          echo "findings_medium=${F_MED}"
          echo "findings_total=${F_TOTAL}"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::AgentGraph trust grade for ${REPO}: ${GRADE} (${SCORE_INT}/100, ${SCAN_RESULT}) — ${REPORT_URL}"

        # Job summary.
        {
          echo "## AgentGraph Trust Scan"
          echo ""
          echo "**${REPO}** — Grade **${GRADE}** (${SCORE_INT}/100), result: \`${SCAN_RESULT}\`"
          echo ""
          echo "| Critical | High | Medium | Total |"
          echo "|---|---|---|---|"
          echo "| ${F_CRIT} | ${F_HIGH} | ${F_MED} | ${F_TOTAL} |"
          echo ""
          echo "[View full report](${REPORT_URL}) · ![badge](${BADGE_URL})"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Post sticky PR comment
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        AG_REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        TARGET_REPO: ${{ github.repository }}
        SCORE: ${{ steps.scan.outputs.trust_score }}
        GRADE: ${{ steps.scan.outputs.grade }}
        SCAN_RESULT: ${{ steps.scan.outputs.scan_result }}
        BADGE_URL: ${{ steps.scan.outputs.badge_url }}
        REPORT_URL: ${{ steps.scan.outputs.report_url }}
        F_CRIT: ${{ steps.scan.outputs.findings_critical }}
        F_HIGH: ${{ steps.scan.outputs.findings_high }}
        F_MED: ${{ steps.scan.outputs.findings_medium }}
        F_TOTAL: ${{ steps.scan.outputs.findings_total }}
      run: |
        set -euo pipefail

        MARKER="<!-- agentgraph-trust-scan -->"
        BADGE_MD="[![AgentGraph Trust](${BADGE_URL})](${REPORT_URL})"

        # Build the comment body. Use printf (not an indented heredoc) so the
        # markdown is emitted with no leading whitespace.
        BODY=$(printf '%s\n' \
          "${MARKER}" \
          "## ${BADGE_MD}" \
          "" \
          "**AgentGraph Trust Scan** for \`${AG_REPO}\`" \
          "" \
          "| Grade | Score | Result |" \
          "|-------|-------|--------|" \
          "| **${GRADE}** | ${SCORE}/100 | \`${SCAN_RESULT}\` |" \
          "" \
          "| Critical | High | Medium | Total findings |" \
          "|----------|------|--------|----------------|" \
          "| ${F_CRIT} | ${F_HIGH} | ${F_MED} | ${F_TOTAL} |" \
          "" \
          "[View the full trust report →](${REPORT_URL})" \
          "" \
          "<details>" \
          "<summary>Add the trust badge to your README</summary>" \
          "" \
          '```markdown' \
          "[![AgentGraph Trust](${BADGE_URL})](${REPORT_URL})" \
          '```' \
          "</details>" \
          "" \
          '<sub>Scanned for free by <a href="https://agentgraph.co">AgentGraph</a> — trust infrastructure for AI agents. No secret required.</sub>')

        # Find an existing sticky comment by marker, then update it; else create.
        EXISTING_ID=$(gh api \
          "repos/${TARGET_REPO}/issues/${PR_NUMBER}/comments" \
          --paginate \
          --jq "map(select(.body | contains(\"${MARKER}\"))) | .[0].id // empty" 2>/dev/null || true)

        if [ -n "$EXISTING_ID" ]; then
          echo "::debug::Updating existing trust-scan comment ${EXISTING_ID}"
          gh api --method PATCH \
            "repos/${TARGET_REPO}/issues/comments/${EXISTING_ID}" \
            -f body="$BODY" >/dev/null
        else
          echo "::debug::Creating new trust-scan comment"
          gh api --method POST \
            "repos/${TARGET_REPO}/issues/${PR_NUMBER}/comments" \
            -f body="$BODY" >/dev/null
        fi

    - name: Enforce threshold
      if: ${{ inputs.fail-below != '0' }}
      shell: bash
      env:
        SCORE: ${{ steps.scan.outputs.trust_score }}
        GRADE: ${{ steps.scan.outputs.grade }}
        AG_FAIL_BELOW: ${{ inputs.fail-below }}
        REPORT_URL: ${{ steps.scan.outputs.report_url }}
      run: |
        set -euo pipefail
        if [ "${SCORE}" -lt "${AG_FAIL_BELOW}" ]; then
          echo "::error::AgentGraph trust score ${SCORE} (grade ${GRADE}) is below the required threshold of ${AG_FAIL_BELOW}. See ${REPORT_URL}"
          exit 1
        fi
        echo "::notice::Trust score ${SCORE} meets the threshold of ${AG_FAIL_BELOW}."
