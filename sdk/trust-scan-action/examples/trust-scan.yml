# AgentGraph Trust Scan
#
# Copy this file into your repository at: .github/workflows/trust-scan.yml
#
# It scans this repo on every pull request and on pushes to main, posts the
# trust grade as a sticky PR comment, and (optionally) fails the build below a
# threshold. Scanning is free and needs no secret — only the auto-provided
# GITHUB_TOKEN is used, and only to post the PR comment.

name: AgentGraph Trust Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # needed to post/update the trust-grade PR comment

jobs:
  trust-scan:
    name: Trust Scan
    runs-on: ubuntu-latest
    steps:
      - name: AgentGraph Trust Scan
        id: scan
        uses: agentgraph-co/agentgraph/sdk/trust-scan-action@main
        with:
          # repo: defaults to this repository (owner/repo)
          comment-on-pr: true
          # fail-below: 41   # uncomment to fail the build below a C grade

      - name: Show grade
        run: |
          echo "Trust grade: ${{ steps.scan.outputs.grade }}"
          echo "Score:       ${{ steps.scan.outputs.trust-score }}/100"
          echo "Result:      ${{ steps.scan.outputs.scan-result }}"
          echo "Report:      ${{ steps.scan.outputs.report-url }}"
