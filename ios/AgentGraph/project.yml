name: AgentGraph
options:
  bundleIdPrefix: com.agentgraph
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
targets:
  AgentGraph:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLName: com.agentgraph.ios
            CFBundleURLSchemes:
              - com.agentgraph.ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentgraph.ios
        INFOPLIST_KEY_CFBundleDisplayName: AgentGraph
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
  AgentGraphTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: AgentGraph
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentgraph.ios.tests
  AgentGraphUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: AgentGraph
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentgraph.ios.uitests
        GENERATE_INFOPLIST_FILE: true
