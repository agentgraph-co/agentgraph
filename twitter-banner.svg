<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Ambient glow zones -->
  <ellipse cx="350" cy="250" rx="400" ry="250" fill="url(#glow1)"/>
  <ellipse cx="1150" cy="200" rx="350" ry="200" fill="url(#glow2)"/>
  <ellipse cx="750" cy="400" rx="300" ry="150" fill="url(#glow1)" opacity="0.5"/>

  <!-- Network connections (mycelium lines) -->
  <g stroke="#6366f1" stroke-opacity="0.2" stroke-width="1" fill="none">
    <!-- Left cluster -->
    <line x1="120" y1="150" x2="250" y2="200"/>
    <line x1="250" y1="200" x2="350" y2="130"/>
    <line x1="250" y1="200" x2="300" y2="320"/>
    <line x1="120" y1="150" x2="180" y2="300"/>
    <line x1="180" y1="300" x2="300" y2="320"/>
    <line x1="300" y1="320" x2="400" y2="380"/>
    <line x1="350" y1="130" x2="450" y2="180"/>
    <line x1="80" y1="280" x2="180" y2="300"/>
    <line x1="120" y1="400" x2="180" y2="300"/>
    <line x1="120" y1="400" x2="300" y2="320"/>

    <!-- Center-left connections -->
    <line x1="450" y1="180" x2="550" y2="120"/>
    <line x1="400" y1="380" x2="520" y2="350"/>
    <line x1="450" y1="180" x2="520" y2="350"/>

    <!-- Right cluster -->
    <line x1="1100" y1="120" x2="1200" y2="200"/>
    <line x1="1200" y1="200" x2="1350" y2="160"/>
    <line x1="1200" y1="200" x2="1250" y2="320"/>
    <line x1="1350" y1="160" x2="1400" y2="280"/>
    <line x1="1400" y1="280" x2="1250" y2="320"/>
    <line x1="1250" y1="320" x2="1150" y2="380"/>
    <line x1="1100" y1="120" x2="1050" y2="250"/>
    <line x1="1050" y1="250" x2="1150" y2="380"/>
    <line x1="1380" y1="400" x2="1250" y2="320"/>
    <line x1="1380" y1="400" x2="1400" y2="280"/>
  </g>

  <!-- Brighter accent connections -->
  <g stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1.5" fill="none">
    <line x1="250" y1="200" x2="450" y2="180"/>
    <line x1="1050" y1="250" x2="1200" y2="200"/>
    <line x1="300" y1="320" x2="520" y2="350"/>
    <line x1="1150" y1="380" x2="1380" y2="400"/>
  </g>

  <!-- Network nodes — left cluster -->
  <g filter="url(#softGlow)">
    <circle cx="120" cy="150" r="5" fill="url(#tealGrad)"/>
    <circle cx="250" cy="200" r="7" fill="url(#nodeGrad)"/>
    <circle cx="350" cy="130" r="4" fill="url(#pinkGrad)"/>
    <circle cx="180" cy="300" r="5" fill="url(#tealGrad)"/>
    <circle cx="300" cy="320" r="6" fill="url(#nodeGrad)"/>
    <circle cx="400" cy="380" r="4" fill="url(#pinkGrad)"/>
    <circle cx="80" cy="280" r="3" fill="url(#tealGrad)"/>
    <circle cx="120" cy="400" r="4" fill="url(#nodeGrad)"/>
    <circle cx="450" cy="180" r="5" fill="url(#tealGrad)"/>
    <circle cx="550" cy="120" r="3" fill="url(#pinkGrad)"/>
    <circle cx="520" cy="350" r="4" fill="url(#nodeGrad)"/>
  </g>

  <!-- Network nodes — right cluster -->
  <g filter="url(#softGlow)">
    <circle cx="1100" cy="120" r="5" fill="url(#tealGrad)"/>
    <circle cx="1200" cy="200" r="7" fill="url(#nodeGrad)"/>
    <circle cx="1350" cy="160" r="4" fill="url(#pinkGrad)"/>
    <circle cx="1050" cy="250" r="5" fill="url(#tealGrad)"/>
    <circle cx="1250" cy="320" r="6" fill="url(#nodeGrad)"/>
    <circle cx="1400" cy="280" r="4" fill="url(#pinkGrad)"/>
    <circle cx="1150" cy="380" r="5" fill="url(#tealGrad)"/>
    <circle cx="1380" cy="400" r="3" fill="url(#nodeGrad)"/>
  </g>

  <!-- Scattered small background nodes -->
  <g opacity="0.3">
    <circle cx="650" cy="80" r="2" fill="#6366f1"/>
    <circle cx="700" cy="420" r="2.5" fill="#2dd4bf"/>
    <circle cx="850" cy="60" r="2" fill="#e879f9"/>
    <circle cx="900" cy="440" r="2" fill="#6366f1"/>
    <circle cx="600" cy="400" r="1.5" fill="#2dd4bf"/>
    <circle cx="950" cy="100" r="1.5" fill="#e879f9"/>
    <circle cx="500" cy="80" r="2" fill="#6366f1"/>
    <circle cx="1000" cy="430" r="2" fill="#2dd4bf"/>
  </g>

  <!-- Center logo cluster -->
  <g transform="translate(750, 190)" filter="url(#bigGlow)">
    <!-- Outer ring nodes -->
    <circle cx="0" cy="-60" r="8" fill="url(#tealGrad)"/>
    <circle cx="52" cy="-30" r="6" fill="url(#pinkGrad)"/>
    <circle cx="52" cy="30" r="8" fill="url(#tealGrad)"/>
    <circle cx="0" cy="60" r="6" fill="url(#pinkGrad)"/>
    <circle cx="-52" cy="30" r="8" fill="url(#tealGrad)"/>
    <circle cx="-52" cy="-30" r="6" fill="url(#pinkGrad)"/>

    <!-- Connections to center -->
    <line x1="0" y1="-60" x2="0" y2="0" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="52" y1="-30" x2="0" y2="0" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="52" y1="30" x2="0" y2="0" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="0" y2="0" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="-52" y1="30" x2="0" y2="0" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="-52" y1="-30" x2="0" y2="0" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5"/>

    <!-- Ring connections -->
    <line x1="0" y1="-60" x2="52" y2="-30" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>
    <line x1="52" y1="-30" x2="52" y2="30" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>
    <line x1="52" y1="30" x2="0" y2="60" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>
    <line x1="0" y1="60" x2="-52" y2="30" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>
    <line x1="-52" y1="30" x2="-52" y2="-30" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>
    <line x1="-52" y1="-30" x2="0" y2="-60" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="12" fill="url(#nodeGrad)"/>
  </g>

  <!-- Brand text -->
  <text x="750" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#e2e8f0" letter-spacing="2">AgentGraph</text>
  <text x="750" y="345" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8" letter-spacing="4">TRUST INFRASTRUCTURE FOR AI AGENTS</text>

  <!-- Subtle bottom gradient fade -->
  <rect y="440" width="1500" height="60" fill="url(#bg)" opacity="0.7"/>
</svg>
