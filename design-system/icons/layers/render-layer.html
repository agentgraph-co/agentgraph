<!DOCTYPE html>
<html><head><style>
  * { margin: 0; padding: 0; }
  body { width: 1024px; height: 1024px; overflow: hidden; }
  img { display: block; }
</style></head>
<body>
  <img id="layer" width="1024" height="1024" />
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('layer').src = params.get('src') || 'background.svg';
    // Set transparent background for non-background layers
    if (params.get('src') !== 'background.svg') {
      document.body.style.background = 'transparent';
    } else {
      document.body.style.background = '#000';
    }
  </script>
</body>
</html>
