<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="prismGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur"/>
    </filter>
    <linearGradient id="prismFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5B4FC" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#818CF8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="prismSpec" x1="0.1" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#A5B4FC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Prism glow halo -->
  <g transform="rotate(6, 488, 512)">
    <polygon points="375,660 375,364 635,512"
             fill="#6366F1" opacity="0.5" filter="url(#prismGlow)"/>
  </g>
  <!-- Prism body -->
  <g transform="rotate(6, 488, 512)">
    <polygon points="375,660 375,364 635,512" fill="url(#prismFill)"/>
    <polygon points="375,660 375,364 635,512" fill="url(#prismSpec)"/>
    <line x1="400" y1="512" x2="600" y2="512" stroke="#C7D2FE" stroke-width="2" opacity="0.08"/>
    <line x1="420" y1="500" x2="590" y2="470" stroke="#38BDF8" stroke-width="1.5" opacity="0.06"/>
    <line x1="420" y1="524" x2="590" y2="554" stroke="#34A853" stroke-width="1.5" opacity="0.06"/>
    <polygon points="375,660 375,364 635,512"
             fill="none" stroke="#818CF8" stroke-width="3" stroke-linejoin="round" opacity="0.7"/>
    <line x1="377" y1="370" x2="377" y2="530" stroke="#C7D2FE" stroke-width="1.5" opacity="0.25"/>
  </g>
</svg>
