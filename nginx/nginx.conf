# AgentGraph Production nginx Configuration
# Handles: SSL, cookie-based access gate, reverse proxy, static files

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json escape=json '{'
        '"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"request": "$request",'
        '"status": $status,'
        '"body_bytes_sent": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"http_referer": "$http_referer",'
        '"http_user_agent": "$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log json;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # --- Cookie-based access gate ---
    map $cookie_ag_gate $gate_cookie_ok {
        "-317087652" "ok";
        default "";
    }

    map $request_uri $gate_uri_bypass {
        ~^/api/          "ok";
        ~^/health        "ok";
        ~^/auth/callback "ok";
        /gate.html       "ok";
        /robots.txt      "ok";
        /sitemap.xml     "ok";
        ~*\.(json|js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest)$ "ok";
        default          "";
    }

    map "$gate_cookie_ok$gate_uri_bypass" $gate_block {
        ~ok     "";
        default "1";
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name agentgraph.co www.agentgraph.co agentgraph.me www.agentgraph.me;
        return 301 https://agentgraph.co$request_uri;
    }

    # Redirect .me and www to canonical domain
    server {
        listen 443 ssl;
        server_name www.agentgraph.co agentgraph.me www.agentgraph.me;

        ssl_certificate /etc/letsencrypt/live/agentgraph.co/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agentgraph.co/privkey.pem;

        return 301 https://agentgraph.co$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        server_name agentgraph.co;

        # SSL
        ssl_certificate /etc/letsencrypt/live/agentgraph.co/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agentgraph.co/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Access gate
        if ($gate_block) {
            return 302 /gate.html;
        }

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self' wss://agentgraph.co; frame-ancestors 'none'; form-action 'self'; base-uri 'self'" always;

        # Gate page
        location = /gate.html {
            alias /usr/share/nginx/gate.html;
        }

        # Health check
        location /health {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API proxy
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 10s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # WebSocket proxy
        location /api/v1/ws {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Hashed static assets — cached forever
        location /assets/ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Frontend SPA — index.html served for all routes, never cached
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }
}
