# =============================================================================
# AgentGraph Production nginx Configuration — SSL/TLS
# =============================================================================
# Full HTTPS configuration with Let's Encrypt certificates.
#
# Features:
#   - HTTP -> HTTPS redirect (all traffic)
#   - TLS 1.2 + 1.3 with strong ciphers
#   - HSTS and security headers
#   - Cookie-based access gate (djb2 hash of access code)
#   - API and health endpoints bypass the gate
#   - WebSocket proxy with upgrade support
#   - Rate limiting (API: 30r/s, Auth: 5r/m)
#   - Static asset caching (30 days, immutable)
#   - Gzip compression
#   - OCSP stapling for faster TLS handshakes
#
# Gate hash: ***REMOVED*** (djb2). Do NOT put the plaintext code in source control.
# API routes, /health, and /auth/callback bypass the gate entirely.
#
# Used by: docker-compose.prod.yml (nginx container)
# Certs from: /etc/letsencrypt/live/agentgraph.co/ (mounted from host)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    # --- Structured JSON access log ---
    log_format json escape=json '{'
        '"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"request": "$request",'
        '"status": $status,'
        '"body_bytes_sent": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"http_referer": "$http_referer",'
        '"http_user_agent": "$http_user_agent",'
        '"ssl_protocol": "$ssl_protocol",'
        '"ssl_cipher": "$ssl_cipher"'
    '}';

    access_log /var/log/nginx/access.log json;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # --- Rate limiting zones ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # =========================================================================
    # Cookie-based access gate
    # =========================================================================
    # The gate uses a djb2 hash of the access code stored in a cookie.
    # gate.html contains the self-contained gate page that sets the cookie.
    # API routes, /health, and OAuth callbacks bypass the gate so that
    # agent SDKs, bots, and iOS clients with Bearer tokens work without
    # needing the gate cookie.
    # =========================================================================

    map $cookie_ag_gate $gate_cookie_ok {
        "***REMOVED***" "ok";
        default "";
    }

    map $request_uri $gate_uri_bypass {
        ~^/api/          "ok";
        ~^/health        "ok";
        ~^/auth/callback "ok";
        /gate.html       "ok";
        default          "";
    }

    map "$gate_cookie_ok$gate_uri_bypass" $gate_block {
        ~ok     "";
        default "1";
    }

    # =========================================================================
    # Server: HTTP -> HTTPS redirect
    # =========================================================================
    # All HTTP traffic is redirected to HTTPS. This includes the ACME challenge
    # path which certbot handles via standalone mode (nginx is stopped during
    # renewal), so no /.well-known/acme-challenge location is needed here.
    # =========================================================================

    server {
        listen 80;
        server_name agentgraph.co www.agentgraph.co;

        # Redirect everything to HTTPS on the canonical domain
        return 301 https://agentgraph.co$request_uri;
    }

    # =========================================================================
    # Server: Redirect www to canonical domain (HTTPS)
    # =========================================================================

    server {
        listen 443 ssl;
        http2 on;
        server_name www.agentgraph.co;

        # --- SSL certificates ---
        ssl_certificate /etc/letsencrypt/live/agentgraph.co/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agentgraph.co/privkey.pem;

        return 301 https://agentgraph.co$request_uri;
    }

    # =========================================================================
    # Server: Main HTTPS (agentgraph.co)
    # =========================================================================

    server {
        listen 443 ssl;
        http2 on;
        server_name agentgraph.co;

        # --- SSL certificates ---
        ssl_certificate /etc/letsencrypt/live/agentgraph.co/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agentgraph.co/privkey.pem;

        # --- TLS configuration ---
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # --- TLS session caching ---
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # --- OCSP stapling ---
        # Speeds up TLS handshake by stapling the OCSP response
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/agentgraph.co/chain.pem;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # --- Security headers ---
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss://agentgraph.co https://accounts.google.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self'" always;

        # --- Access gate ---
        # Blocks browser access unless the ag_gate cookie is set.
        # API routes bypass entirely (for SDK/bot/iOS access).
        if ($gate_block) {
            return 302 /gate.html;
        }

        # --- Gate page ---
        location = /gate.html {
            alias /usr/share/nginx/gate.html;
        }

        # --- Health check (no gate, no rate limit) ---
        location /health {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Auth endpoints (stricter rate limit) ---
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # --- WebSocket proxy ---
        location /api/v1/ws {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections can be long-lived
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # --- API proxy (general) ---
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Allow large request bodies (file uploads, etc.)
            client_max_body_size 10m;
        }

        # --- Frontend static files ---
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively (Vite hashes filenames)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";

                # Re-add security headers since add_header in nested block
                # clears parent headers
                add_header X-Content-Type-Options "nosniff" always;
            }
        }
    }
}
