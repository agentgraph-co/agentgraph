<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="256" cy="256" r="256" fill="#111827"/>
  <!-- Welcoming hand with energy rays - scaled to fill -->
  <g transform="translate(256,256) scale(1.15) translate(-256,-256)">
    <!-- Energy rays -->
    <g opacity="0.6">
      <path d="M340 100 L360 60" stroke="#F9A8D4" stroke-width="6" stroke-linecap="round"/>
      <path d="M400 150 L440 120" stroke="#EC4899" stroke-width="5" stroke-linecap="round"/>
      <path d="M420 220 L468 200" stroke="#F9A8D4" stroke-width="5" stroke-linecap="round"/>
      <path d="M172 100 L152 60" stroke="#F9A8D4" stroke-width="6" stroke-linecap="round"/>
      <path d="M112 150 L72 120" stroke="#EC4899" stroke-width="5" stroke-linecap="round"/>
    </g>
    <!-- Waving hand -->
    <g transform="translate(256, 270)">
      <!-- Palm -->
      <path d="M-10 40 C-40 40, -60 10, -60 -20 L-60 -80 C-60 -90, -50 -98, -40 -98 C-30 -98, -20 -90, -20 -80 L-20 -40" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3"/>
      <!-- Index finger -->
      <path d="M-20 -40 L-20 -110 C-20 -120, -10 -128, 0 -128 C10 -128, 20 -120, 20 -110 L20 -40" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3"/>
      <!-- Middle finger -->
      <path d="M20 -40 L20 -120 C20 -130, 30 -138, 40 -138 C50 -138, 60 -130, 60 -120 L60 -40" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3"/>
      <!-- Ring finger -->
      <path d="M60 -40 L60 -105 C60 -115, 70 -123, 80 -123 C90 -123, 100 -115, 100 -105 L100 -20" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3"/>
      <!-- Pinky -->
      <path d="M100 -20 L100 -85 C100 -95, 108 -100, 116 -100 C124 -100, 132 -95, 132 -85 L132 0" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3"/>
      <!-- Thumb -->
      <path d="M-60 -20 C-80 -10, -85 10, -75 30 L-50 50 C-40 58, -25 50, -25 40" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3"/>
      <!-- Palm base -->
      <path d="M-60 40 C-60 80, -30 100, 36 100 C80 100, 132 80, 132 40 L132 0 C132 20, 100 30, 36 30 C-20 30, -40 20, -60 0 Z" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3"/>
    </g>
    <!-- Motion lines -->
    <g stroke="#EC4899" stroke-width="6" stroke-linecap="round" opacity="0.7">
      <path d="M380 200 C400 240, 400 300, 380 340"/>
      <path d="M410 170 C440 230, 440 310, 410 370"/>
    </g>
  </g>
</svg>
