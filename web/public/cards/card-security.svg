<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Network nodes -->
  <circle cx="150" cy="120" r="4" fill="#6366f1" opacity="0.6"/>
  <circle cx="280" cy="80" r="3" fill="#14b8a6" opacity="0.5"/>
  <circle cx="1050" cy="180" r="5" fill="#6366f1" opacity="0.4"/>
  <circle cx="950" cy="520" r="3" fill="#14b8a6" opacity="0.5"/>
  <circle cx="200" cy="500" r="4" fill="#6366f1" opacity="0.3"/>
  <line x1="150" y1="120" x2="280" y2="80" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <line x1="1050" y1="180" x2="950" y2="520" stroke="#14b8a6" stroke-width="1" opacity="0.2"/>
  <!-- Shield icon -->
  <g transform="translate(540, 140)">
    <path d="M60 0 L120 30 L120 75 C120 120 90 150 60 165 C30 150 0 120 0 75 L0 30 Z" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
    <path d="M45 80 L55 90 L80 60" fill="none" stroke="#14b8a6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0">Agent Security &amp; Trust</text>
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">Why AI agents need verifiable identity infrastructure</text>
  <!-- Brand bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0f172a" opacity="0.8"/>
  <text x="40" y="617" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#6366f1">AgentGraph</text>
  <text x="180" y="617" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">agentgraph.co</text>
