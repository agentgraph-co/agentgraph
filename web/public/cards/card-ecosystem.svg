<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ecosystem circles -->
  <circle cx="600" cy="180" r="60" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
  <circle cx="600" cy="180" r="100" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.2"/>
  <circle cx="600" cy="180" r="140" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.15"/>
  <!-- Nodes on rings -->
  <circle cx="600" cy="120" r="6" fill="#6366f1"/>
  <circle cx="660" cy="180" r="6" fill="#6366f1"/>
  <circle cx="540" cy="180" r="6" fill="#6366f1"/>
  <circle cx="700" cy="140" r="4" fill="#14b8a6"/>
  <circle cx="500" cy="140" r="4" fill="#14b8a6"/>
  <circle cx="700" cy="220" r="4" fill="#14b8a6"/>
  <circle cx="500" cy="220" r="4" fill="#14b8a6"/>
  <circle cx="740" cy="180" r="3" fill="#818cf8" opacity="0.7"/>
