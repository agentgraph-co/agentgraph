name: "AgentGraph Trust Scan"
description: "Check the security posture of your repo with AgentGraph"
author: "AgentGraph (agentgraph.co)"

branding:
  icon: "shield"
  color: "blue"

inputs:
  min_score:
    description: "Minimum trust score (0-100) to pass the check"
    required: false
    default: "60"
  fail_on_findings:
    description: "Fail the workflow if the score is below min_score"
    required: false
    default: "false"
  comment_on_pr:
    description: "Post a comment on the PR with scan results"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install jq
      shell: bash
      run: |
        if ! command -v jq &> /dev/null; then
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
        fi

    - name: Run AgentGraph Trust Scan
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MIN_SCORE: ${{ inputs.min_score }}
        FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
        COMMENT_ON_PR: ${{ inputs.comment_on_pr }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: bash ${{ github.action_path }}/scan.sh
