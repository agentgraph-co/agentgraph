name: 'AgentGraph Trust Scan'
description: 'Scan your MCP server or AI agent tool for security issues and get a trust grade'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  repo:
    description: 'Repository to scan (owner/repo). Defaults to current repo.'
    required: false
    default: '${{ github.repository }}'
  min-score:
    description: 'Minimum trust score to pass (0-100). Set to 0 to never fail.'
    required: false
    default: '0'
  comment:
    description: 'Post results as a PR comment (true/false)'
    required: false
    default: 'true'
  badge:
    description: 'Update README badge (true/false)'
    required: false
    default: 'false'

outputs:
  score:
    description: 'Trust score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Letter grade (A+/A/B/C/D/F)'
    value: ${{ steps.scan.outputs.grade }}
  tier:
    description: 'Trust tier (verified/trusted/standard/minimal/restricted/blocked)'
    value: ${{ steps.scan.outputs.tier }}
  scan-result:
    description: 'Scan result (clean/warnings/critical)'
    value: ${{ steps.scan.outputs.scan_result }}
  is-mcp-server:
    description: 'Whether MCP server context was detected'
    value: ${{ steps.scan.outputs.is_mcp_server }}

runs:
  using: 'composite'
  steps:
    - name: Run Trust Scan
      id: scan
      shell: bash
      run: |
        REPO="${{ inputs.repo }}"
        echo "Scanning $REPO..."

        RESULT=$(curl -s "https://agentgraph.co/api/v1/public/scan/$REPO")

        SCORE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('trust_score', 0))")
        GRADE=$(echo "$RESULT" | python3 -c "
        import sys,json
        s = json.load(sys.stdin).get('trust_score', 0)
        g = 'A+' if s>=96 else 'A' if s>=81 else 'B' if s>=61 else 'C' if s>=41 else 'D' if s>=21 else 'F'
        print(g)")
        TIER=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('trust_tier', 'unknown'))")
        SCAN_RESULT=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('scan_result', 'unknown'))")
        IS_MCP=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('metadata', {}).get('is_mcp_server', False))")
        CATS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin).get('category_scores', {})))")

        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "tier=$TIER" >> $GITHUB_OUTPUT
        echo "scan_result=$SCAN_RESULT" >> $GITHUB_OUTPUT
        echo "is_mcp_server=$IS_MCP" >> $GITHUB_OUTPUT

        echo "## AgentGraph Trust Scan" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Score** | $SCORE/100 |" >> $GITHUB_STEP_SUMMARY
        echo "| **Grade** | $GRADE |" >> $GITHUB_STEP_SUMMARY
        echo "| **Tier** | $TIER |" >> $GITHUB_STEP_SUMMARY
        echo "| **Result** | $SCAN_RESULT |" >> $GITHUB_STEP_SUMMARY
        echo "| **MCP Server** | $IS_MCP |" >> $GITHUB_STEP_SUMMARY
        echo "| **Categories** | $CATS |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "[Full report](https://agentgraph.co/api/v1/public/scan/$REPO)" >> $GITHUB_STEP_SUMMARY

        # Check minimum score
        MIN=${{ inputs.min-score }}
        if [ "$SCORE" -lt "$MIN" ]; then
          echo "::error::Trust score $SCORE is below minimum $MIN"
          exit 1
        fi

    - name: Post PR Comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        BODY="## 🔒 AgentGraph Trust Scan\n\n"
        BODY+="| Metric | Value |\n|--------|-------|\n"
        BODY+="| **Score** | ${{ steps.scan.outputs.score }}/100 |\n"
        BODY+="| **Grade** | ${{ steps.scan.outputs.grade }} |\n"
        BODY+="| **Tier** | ${{ steps.scan.outputs.tier }} |\n"
        BODY+="| **Result** | ${{ steps.scan.outputs.scan_result }} |\n\n"
        BODY+="[Full report](https://agentgraph.co/api/v1/public/scan/${{ inputs.repo }})"

        gh pr comment ${{ github.event.pull_request.number }} --body "$(echo -e "$BODY")"
