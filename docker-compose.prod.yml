# =============================================================================
# AgentGraph Production — Docker Compose
# =============================================================================
# Instance: t3.small (2 vCPU, 2GB RAM)
#
# Memory budget (2048 MB total):
#   nginx:     64 MB
#   backend:  768 MB  (2 uvicorn workers)
#   postgres: 512 MB
#   redis:    128 MB
#   ─────────────────
#   Total:   1472 MB  → ~576 MB free for OS + buffers
#
# SWAP SETUP (run once on EC2 before first deploy under load):
#   sudo fallocate -l 2G /swapfile
#   sudo chmod 600 /swapfile
#   sudo mkswap /swapfile
#   sudo swapon /swapfile
#   echo '/swapfile swap swap defaults 0 0' | sudo tee -a /etc/fstab
#   sudo sysctl vm.swappiness=10
#   echo 'vm.swappiness=10' | sudo tee -a /etc/sysctl.conf
#
# UPGRADE PATH (t3.small → t3.medium):
#   1. Stop instance:    aws ec2 stop-instances --instance-ids ***REMOVED***
#   2. Change type:      aws ec2 modify-instance-attribute --instance-id ***REMOVED*** --instance-type '{"Value":"t3.medium"}'
#   3. Start instance:   aws ec2 start-instances --instance-ids ***REMOVED***
#   4. Elastic IP stays: ***REMOVED*** (no DNS change needed)
#   Note: ~2 min downtime. t3.medium = 2 vCPU, 4GB RAM, ~$30/mo vs ~$15/mo
#
# MONITORING:
#   ./scripts/check-capacity.sh           — remote capacity report
#   ./scripts/health-check-prod.sh        — endpoint health check
# =============================================================================

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/gate.html:/usr/share/nginx/gate.html:ro
      - ./web/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 64M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
      - .env.secrets
    expose:
      - "8000"
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level warning
      --proxy-headers
      --forwarded-allow-ips="172.16.0.0/12"
    volumes:
      - ./digest_history.json:/app/digest_history.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 768M

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-agentgraph}
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentgraph}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres-data:
  redis-data:
