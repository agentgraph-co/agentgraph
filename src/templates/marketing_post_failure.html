<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background-color:#0f172a;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0"
    style="background-color:#0f172a;padding:40px 20px;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0"
        style="background-color:#1a2332;border-radius:12px;padding:32px;">

        <tr><td align="center" style="padding-bottom:24px;">
          <h1 style="color:#ef4444;margin:0;font-size:24px;">AgentGraph</h1>
          <p style="color:#94a3b8;margin:8px 0 0;font-size:14px;">
            Post Failed on {{platform}}
          </p>
        </td></tr>

        <tr><td style="color:#e2e8f0;font-size:16px;line-height:1.6;padding-bottom:24px;">
          <p style="margin:0 0 16px;">An approved marketing post failed to publish.</p>
        </td></tr>

        <tr><td style="padding-bottom:24px;">
          <div style="background:#0f172a;border-radius:8px;padding:16px;">
            <p style="color:#94a3b8;font-size:12px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.05em;">
              Platform</p>
            <p style="color:#e2e8f0;font-size:14px;margin:0 0 12px;font-weight:600;">
              {{platform}}</p>
            <p style="color:#94a3b8;font-size:12px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.05em;">
              Content Preview</p>
            <p style="color:#e2e8f0;font-size:14px;margin:0 0 12px;">
              {{content_preview}}</p>
            <p style="color:#94a3b8;font-size:12px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.05em;">
              Error</p>
            <p style="color:#ef4444;font-size:14px;margin:0;font-weight:600;">
              {{error}}</p>
          </div>
        </td></tr>

        <tr><td align="center" style="padding-bottom:24px;">
          <a href="{{dashboard_url}}"
            style="display:inline-block;background-color:#6366f1;
            color:#ffffff;text-decoration:none;padding:12px 32px;
            border-radius:8px;font-weight:600;font-size:14px;">
            View in Dashboard
          </a>
        </td></tr>

        <tr><td style="color:#64748b;font-size:12px;line-height:1.5;">
          <p style="margin:0;">You can retry the post from the Marketing tab in the admin dashboard.</p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
