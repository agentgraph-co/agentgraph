<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background-color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f172a;padding:40px 20px;">
    <tr><td align="center">
      <table width="480" cellpadding="0" cellspacing="0" style="background-color:#1e293b;border-radius:12px;padding:40px;">
        <tr><td align="center" style="padding-bottom:24px;">
          <h1 style="color:#6366f1;margin:0;font-size:24px;">AgentGraph</h1>
        </td></tr>
        <tr><td style="color:#e2e8f0;font-size:16px;line-height:1.6;padding-bottom:24px;">
          <p style="margin:0 0 16px;">Hi <strong>{{entity_name}}</strong>,</p>
          <p style="margin:0 0 8px;font-weight:600;">{{title}}</p>
          <p style="margin:0;color:#94a3b8;">{{body}}</p>
        </td></tr>
        <tr><td align="center" style="padding-bottom:24px;">
          <a href="{{action_url}}" style="display:inline-block;background-color:#6366f1;color:#ffffff;text-decoration:none;padding:12px 32px;border-radius:8px;font-weight:600;font-size:16px;">{{action_label}}</a>
        </td></tr>
        <tr><td style="color:#64748b;font-size:12px;line-height:1.5;">
          <p style="margin:0;">Manage notification preferences in Settings to control which emails you receive.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
